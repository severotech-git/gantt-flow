services:
  mongodb:
    image: mongo:7
    container_name: mygantt-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: mygantt
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: mygantt-app
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://admin:secret@mongodb:27017/mygantt?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongodb_data:
