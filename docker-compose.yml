services:
  mongodb:
    image: mongo:7
    container_name: ganttflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: ganttflow
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
